services:
  ai-orchestrator:
    image: nyepetke/ai-super:latest
    container_name: ai-orchestrator
    restart: always
    ports:
      - "7860:7860"
    volumes:
      - ./data:/app/data
      - ./rag_documents:/app/rag_documents
      - ./.env:/app/.env
    env_file:
      - .env
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/api/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 40s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - ai-orchestrator
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup --label-enable
    # --interval 300 artinya cek update setiap 5 menit (300 detik)
    # --cleanup menghapus image lama setelah update
    # --label-enable hanya mengupdate container dengan label watchtower.enable=true
